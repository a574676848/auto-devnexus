name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Check shell scripts
      run: |
        find . -name "*.sh" -type f | while read -r script; do
          echo "Checking $script"
          bash -n "$script"
        done
    
    - name: Check file permissions
      run: |
        find skills -name "*.sh" -type f | while read -r script; do
          if [ ! -x "$script" ]; then
            echo "Warning: $script is not executable"
          fi
        done

  validate-skills:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate Skill structure
      run: |
        errors=0
        for skill_dir in skills/*/; do
          skill_name=$(basename "$skill_dir")
          echo "Validating $skill_name..."
          
          # Check required files
          if [ ! -f "$skill_dir/SKILL.md" ]; then
            echo "❌ Missing SKILL.md in $skill_name"
            errors=$((errors + 1))
          fi
          
          if [ ! -f "$skill_dir/README.md" ]; then
            echo "❌ Missing README.md in $skill_name"
            errors=$((errors + 1))
          fi
          
          if [ ! -f "$skill_dir/scripts/$skill_name.sh" ]; then
            echo "❌ Missing script in $skill_name"
            errors=$((errors + 1))
          fi
          
          # Check YAML front matter in SKILL.md
          if [ -f "$skill_dir/SKILL.md" ]; then
            if ! grep -q "^---$" "$skill_dir/SKILL.md"; then
              echo "❌ Missing YAML front matter in $skill_name/SKILL.md"
              errors=$((errors + 1))
            fi
          fi
        done
        
        if [ $errors -gt 0 ]; then
          echo "Found $errors error(s)"
          exit 1
        fi
        echo "✅ All skills validated successfully"
